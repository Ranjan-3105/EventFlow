services:
  postgres:
    image: postgres:17
    container_name: eventflow-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eventdb

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d eventdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: